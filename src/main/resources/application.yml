server:
  port: 8080

spring:
  application:
    name: spring-ai-milvus

  # MySQL 数据源（本地图书数据库）
  datasource:
    url: jdbc:mysql://localhost:3306/david?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  ai:
    zhipuai:
      api-key: ce2a6ef2fcd04374bfccb16ad3b77902.anseRktFmfA4Ztfq
      chat:
        options:
          model: glm-4
      embedding:
        options:
          model: embedding-3
    vectorstore:
      milvus:
        client:
          host: 172.22.98.200
          port: 19530
        collection-name: book
        database-name: default
        embedding-dimension: 2048
        index-type: IVF_FLAT
        metric-type: COSINE
        # ===== 自定义业务配置 =====
        # 每次最多同步多少本书（0=不限制），控制 Embedding API 用量
        max-books-per-sync: 50
        # 是否启用去重（跳过已在Milvus中的图书），避免重复向量化
        enable-dedup: true
